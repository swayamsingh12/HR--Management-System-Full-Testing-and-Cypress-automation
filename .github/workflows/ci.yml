name: HRMS CI

# Runs on every push to main and on every pull request.
on:
  push:
    branches: [main]
  pull_request:

# ---------------------------------------------------------------------------
# NOTE ON EXPECTED FAILURES
# This project intentionally contains known seeded bugs (e.g. BUG-004, BUG-006,
# BUG-007). The Newman and Cypress suites include tests that assert the CORRECT
# behaviour, so those specific tests FAIL today — that is exactly how they
# document the bugs, and they will start passing once the bugs are fixed.
#
# Because of that, the Newman and Cypress steps use `continue-on-error: true`
# so the pipeline is not turned red purely by known bugs. The "Smoke Tests" job
# has NO continue-on-error — it is the hard gate and must always pass (it proves
# the server is up, the database is connected, and the payroll endpoint works).
# ---------------------------------------------------------------------------

jobs:
  # =========================================================================
  # JOB 1 - API tests (Newman / Postman)
  # =========================================================================
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Install Newman + htmlextra reporter
        run: npm install -g newman newman-reporter-htmlextra

      - name: Create backend .env
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          cat > backend/.env <<EOF
          PORT=5000
          MONGODB_URI=$MONGODB_URI
          JWT_SECRET=$JWT_SECRET
          NODE_ENV=test
          EOF

      - name: Start backend (background)
        working-directory: backend
        run: npm start > ../backend.log 2>&1 &

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/auth/me || echo 000)
            if [ "$code" != "000" ]; then echo "Backend is up (HTTP $code)"; exit 0; fi
            echo "waiting for backend... ($i/30)"; sleep 1
          done
          echo "Backend did not become ready in 30s"; cat backend.log || true; exit 1

      # continue-on-error: the "Known Bugs" tests in the collection fail on purpose.
      - name: Run Newman API tests
        id: newman
        continue-on-error: true
        run: |
          newman run api-tests/hrms-api-tests.postman_collection.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export api-tests/newman-report.html

      - name: Upload Newman HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: api-tests/newman-report.html
          if-no-files-found: warn

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-tests-backend-log
          path: backend.log
          if-no-files-found: ignore

  # =========================================================================
  # JOB 2 - E2E tests (Cypress)
  # =========================================================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: api-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Create backend .env
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          cat > backend/.env <<EOF
          PORT=5000
          MONGODB_URI=$MONGODB_URI
          JWT_SECRET=$JWT_SECRET
          NODE_ENV=test
          EOF

      - name: Create frontend .env
        run: echo "VITE_API_URL=http://localhost:5000/api" > frontend/.env

      - name: Start backend (background)
        working-directory: backend
        run: npm start > ../backend.log 2>&1 &

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/auth/me || echo 000)
            if [ "$code" != "000" ]; then echo "Backend is up (HTTP $code)"; exit 0; fi
            echo "waiting for backend... ($i/30)"; sleep 1
          done
          echo "Backend did not become ready in 30s"; cat backend.log || true; exit 1

      - name: Start frontend (background)
        working-directory: frontend
        run: npm run dev > ../frontend.log 2>&1 &

      - name: Wait for frontend to be ready
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo 000)
            if [ "$code" != "000" ]; then echo "Frontend is up (HTTP $code)"; exit 0; fi
            echo "waiting for frontend... ($i/60)"; sleep 1
          done
          echo "Frontend did not become ready in 60s"; cat frontend.log || true; exit 1

      # continue-on-error: Cypress bug specs (BUG-001/002/006/007/008) fail on purpose.
      # video=true is forced here so we always have video artifacts (config defaults to off).
      - name: Run Cypress E2E (headless)
        id: cypress
        continue-on-error: true
        run: npx cypress run --headless --config video=true

      - name: Upload Cypress screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
          if-no-files-found: ignore

  # =========================================================================
  # JOB 3 - Smoke tests (HARD GATE - must always pass)
  # =========================================================================
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Create backend .env
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          cat > backend/.env <<EOF
          PORT=5000
          MONGODB_URI=$MONGODB_URI
          JWT_SECRET=$JWT_SECRET
          NODE_ENV=test
          EOF

      - name: Start backend (background)
        working-directory: backend
        run: npm start > ../backend.log 2>&1 &

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/auth/me || echo 000)
            if [ "$code" != "000" ]; then echo "Backend is up (HTTP $code)"; exit 0; fi
            echo "waiting for backend... ($i/30)"; sleep 1
          done
          echo "Backend did not become ready in 30s"; cat backend.log || true; exit 1

      # No continue-on-error: this is the real pass/fail gate for the pipeline.
      - name: Run smoke tests
        run: node scripts/smoke-test.js
